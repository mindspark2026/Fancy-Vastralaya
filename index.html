<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Vastralaya | Online Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{font-family:Poppins;background:#f5f5f5}

header{
background:#111;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center
}

header h1{font-size:22px}

.search input{
padding:8px 12px;
border-radius:20px;
border:none;
width:180px
}

.hero{
height:320px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:32px;
font-weight:600
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px
}

.product{
background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1)
}

.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px
}

.price{font-weight:600;margin:6px 0}

.rating{color:#f1c40f;font-size:14px}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#d4af37;
color:white;
cursor:pointer;
margin-top:6px
}

.cart{
position:fixed;
top:80px;
right:20px;
width:270px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2)
}

.cart-item{font-size:14px;margin-bottom:6px}

.qty-btn{background:#333;margin-left:4px}

.remove{background:#e74c3c;margin-left:6px}

.checkout{background:#25d366;width:100%;margin-top:10px}

.form{margin-top:10px}

.form input{
width:100%;
padding:8px;
margin-bottom:6px;
border:1px solid #ccc;
border-radius:6px
}

footer{
background:#111;
color:#aaa;
text-align:center;
padding:15px;
margin-top:30px
}

.badge{
background:red;
color:white;
padding:3px 6px;
border-radius:4px;
font-size:11px;
position:absolute;
margin:5px
}

</style>
</head>

<body>

<header>
<h1>Fancy Vastralaya</h1>
<div class="search">
<input type="text" placeholder="Search products..." onkeyup="searchProducts()" id="search">
</div>
</header>

<div class="hero" id="hero">Premium Clothing Collection</div>

<div class="products" id="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c?q=80&w=800">
<h3>Saree</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<div class="price">₹799</div>
<button onclick="addToCart('Saree',799)">Add to Cart</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61OLA2QriBL._SX679_.jpg">
<h3>Shirt Cloth</h3>
<div class="rating">⭐⭐⭐⭐⭐</div>
<div class="price">₹499</div>
<button onclick="addToCart('Shirt Cloth',499)">Add to Cart</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/71N9nh4-NkL._SX679_.jpg">
<h3>Pant Cloth</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<div class="price">₹699</div>
<button onclick="addToCart('Pant Cloth',699)">Add to Cart</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61TLmrIM8+L._SX679_.jpg">
<h3>Mosquito Net</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<div class="price">₹399</div>
<button onclick="addToCart('Mosquito Net',399)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems">No items</div>
<p><b>Total: ₹<span id="total">0</span></b></p>

<div class="form">
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Delivery Address">
</div>

<button class="checkout" onclick="payUPI()">Pay with UPI</button>
</div>

<footer>
© <span id="year"></span> Fancy Vastralaya | Daudnagar
</footer>

<script>

let cart=[];

function addToCart(name,price){
let existing=cart.find(p=>p.name===name);

if(existing){existing.qty+=1}
else{cart.push({name,price,qty:1})}

updateCart();
}

function changeQty(name,delta){
let item=cart.find(p=>p.name===name);
item.qty+=delta;

if(item.qty<=0){cart=cart.filter(p=>p.name!==name)}

updateCart();
}

function removeItem(name){
cart=cart.filter(p=>p.name!==name);
updateCart();
}

function updateCart(){

let items=document.getElementById("cartItems");
let total=0;

if(cart.length===0){
items.innerHTML="No items";
}else{
items.innerHTML="";

cart.forEach(i=>{

let div=document.createElement("div");
div.className="cart-item";

let itemTotal=i.price*i.qty;

div.innerHTML=`${i.name} x${i.qty} - ₹${itemTotal}
<button class='qty-btn' onclick="changeQty('${i.name}',1)">+</button>
<button class='qty-btn' onclick="changeQty('${i.name}',-1)">-</button>
<button class='remove' onclick="removeItem('${i.name}')">x</button>`;

items.appendChild(div);

 total+=itemTotal;
});
}

document.getElementById("total").innerText=total;
}

function payUPI(){

if(cart.length===0){alert("Cart empty");return}

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name||!phone||!address){alert("Fill name phone address");return}

let total=0;
let msg="Hello Fancy Vastralaya,%0AOrder Details:%0A";

cart.forEach(i=>{
let itemTotal=i.price*i.qty;
msg+=`${i.name} x${i.qty} - ₹${itemTotal}%0A`;
 total+=itemTotal;
});

msg+=`Total Paid: ₹${total}%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}`;

let upi="9031845055@ybl";

let upiURL=`upi://pay?pa=${upi}&pn=Fancy%20Vastralaya&am=${total}&cu=INR`;

window.open(upiURL);

setTimeout(()=>{
window.open(`https://wa.me/919031845055?text=${msg}`);
},5000);
}

function searchProducts(){
let input=document.getElementById("search").value.toLowerCase();
let products=document.querySelectorAll(".product");

products.forEach(p=>{
let text=p.innerText.toLowerCase();
if(text.includes(input)){p.style.display="block"}
else{p.style.display="none"}
});
}

// hero slider
let heroImages=[
"https://images.unsplash.com/photo-1445205170230-053b83016050?w=1600",
"https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=1600",
"https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=1600"
];

let index=0;

function changeHero(){
document.getElementById("hero").style.backgroundImage=`url(${heroImages[index]})`;
index++;
if(index>=heroImages.length){index=0}
}

setInterval(changeHero,3000);
changeHero();

document.getElementById("year").innerText=new Date().getFullYear();

</script>

</body>
</html>
